<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticação</title>

    <!--Favicon-->
    <link rel="icon" href="./assets/img/favicon.png">

    <!--Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!--Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!--TailwindCSS-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--CSS-->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!--Scripts-->
    <script src="./assets/script/script.js" defer></script>
</head>

<body class="bg-brand-dark">

    <!--Popup-->
    <div id="popup"
        class="hidden fixed top-[50px] w-75 left-1/2 -translate-x-1/2 lg:left-auto lg:translate-x-0 lg:right-[50px] z-[999] flex items-center gap-3 bg-green-500/10 border border-green-500 text-green-400 px-5 py-4 rounded-xl backdrop-blur-md shadow-lg pointer-events-none transition-all duration-300 ease-in-out">
        <i class="fa-solid fa-circle-check text-[22px]"></i>
        <p id="popup-message" class="text-[14px] font-medium">
            Logado com sucesso!
        </p>
    </div>

    <!--Circles-->
    <div class="fixed inset-0 pointer-events-none">
        <!--Left-top-->
        <div class="hidden xl:flex absolute left-[-211px] top-[-216px] bg-brand w-[330px] h-[330px] rounded-full"></div>
        <!--Center-top-->
        <div
            class="absolute sm:hidden xl:flex top-[-283px] xl:top-[-253px] left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:right-[117px] bg-brand w-[330px] h-[330px] rounded-full">
        </div>
        <!--Right-bottom-->
        <div class="hidden xl:flex absolute xl:right-[428px] bottom-[-272px] bg-brand w-[330px] h-[330px] rounded-full">
        </div>
    </div>

    <!--Main content-->
    <main class="w-full h-screen flex items-center justify-center gap-[200px]">
        <!--Img-->
        <img class="hidden xl:flex" src="assets/img/statue-looking-down.png"
            alt="Imagem de uma estátua usando um notebook">

        <!--Form-->
        <section class="w-[355px] sm:w-[455px] flex flex-col gap-[25px]">

            <!--Welcome message-->
            <div class="flex flex-col items-center">
                <p class="text-gray-500 text-[12px] sm:text-[14px]">Bem-vindo</p>
                <h1 id="form-message" class="text-white text-[20px] sm:text-[24px] font-bold">Entre na sua conta</h1>
            </div>

            <!--Buttons-->
            <div
                class="h-[55px] w-full flex items-center justify-center gap-[5px] border-1 border-gray-500 rounded-full">
                <button id="login-button"
                    class="select h-[45px] w-[170px] sm:w-[220px] rounded-full text-white text-[12px] sm:text-[14px] cursor-pointer hover:opacity-[.9] transition duration-300 ease-in-out">Logar</button>


                <button id="register-button"
                    class="h-[45px] w-[170px] sm:w-[220px] rounded-full text-white text-[12px] sm:text-[14px] cursor-pointer hover:opacity-[.9] transition duration-300 ease-in-out">Registrar</button>
            </div>

            <!--Login form-->
            <div id="login" class="flex flex-col gap-[30px]">
                <!--Form-->
                <form id="login-form" class="flex flex-col gap-[20px]">
                    <!--Email-->
                    <div class="flex flex-col">
                        <label class="ml-[5px] mb-[5px] text-white text-[12px] sm:text-[14px]"
                            for="login-email">E-mail</label>
                        <input
                            class="h-[55px] w-[350px] sm:w-[450px] p-[20px] text-[12px] sm:text-[14px] text-gray-500 border-1 rounded-sm border-gray-500 focus:outline-none"
                            type="email" name="login-email" id="login-email" placeholder="Digite seu e-mail" required>
                    </div>

                    <!--Password-->
                    <div class="flex flex-col w-[350px] sm:w-[450px]">
                        <label class="ml-[5px] mb-[5px] text-white text-[12px] sm:text-[14px]"
                            for="login-password">Senha</label>
                        <div class="relative w-full">
                            <input
                                class="password-input h-[55px] w-full p-[20px] pr-[50px] text-[12px] sm:text-[14px] text-gray-500 border-1 rounded-sm border-gray-500 focus:outline-none"
                                type="password" name="login-password" id="login-password" placeholder="Digite sua senha"
                                required>
                            <div class="absolute inset-y-0 end-0 flex items-center pe-10">
                                <i
                                    class="toggle-password fa-solid fa-eye absolute text-[20px] text-white cursor-pointer"></i>
                            </div>
                        </div>
                    </div>

                    <!--Keep-connected-->
                    <div class="flex items-center">
                        <input id="keep-connected" class="w-[20px] h-[20px] mr-[5px]" type="checkbox"
                            name="keep-connected" required>
                        <label class="text-[12px] sm:text-[14px] text-gray-500 cursor-pointer"
                            for="keep-connected">Mantenha-me
                            conectado</label>
                    </div>

                    <!--Submit-->
                    <div class="flex flex-col gap-[20px] items-center justify-center">
                        <button type="submit"
                            class="submit-button w-full bg-brand h-[55px] text-white font-bold rounded-sm cursor-not-allowed hover:opacity-[.9] transition duration-300 ease-in-out">Conecte-se</button>
                        <p
                            class="text-[12px] sm:text-[14px] text-gray-500 cursor-pointer hover:text-white transition ease-in-out duration-300">
                            Esquece a
                            senha?</p>
                    </div>
                </form>
            </div>

            <!--Register form-->
            <div id="register" class="hidden flex flex-col gap-[30px]">
                <!--Form-->
                <form id="register-form" class="flex flex-col gap-[20px]">

                    <div class="flex gap-[20px]">
                        <!--User-->
                        <div class="flex flex-col">
                            <label class="ml-[5px] mb-[5px] text-white text-[12px] sm:text-[14px]"
                                for="user-name">Usuário</label>
                            <input
                                class="h-[55px] w-[160px] sm:w-[215px] p-[20px] text-[12px] sm:text-[14px] text-gray-500 border-1 rounded-sm border-gray-500 focus:outline-none"
                                type="text" name="user-name" id="user-name" placeholder="Nome de usuário" required>
                        </div>

                        <!--Born date-->
                        <div class="flex flex-col">
                            <label class="ml-[5px] mb-[5px] text-white text-[12px] sm:text-[14px]" for="born-date">Data
                                de
                                nascimento</label>
                            <input
                                class="h-[55px] w-[160px] sm:w-[215px] p-[20px] text-[12px] sm:text-[14px] text-gray-500 border-1 rounded-sm border-gray-500 focus:outline-none"
                                type="date" name="born-date" id="born-date" required>
                        </div>
                    </div>

                    <!--Email-->
                    <div class="flex flex-col">
                        <label class="ml-[5px] mb-[5px] text-white text-[12px] sm:text-[14px]"
                            for="register-email">E-mail</label>
                        <input
                            class="h-[55px] w-[350px] sm:w-[450px] p-[20px] text-[12px] sm:text-[14px] text-gray-500 border-1 rounded-sm border-gray-500 focus:outline-none"
                            type="email" name="register-email" id="register-email" placeholder="Digite seu e-mail"
                            required>
                    </div>

                    <!--Password-->
                    <div class="flex flex-col w-[350px] sm:w-[450px]">
                        <label class="ml-[5px] mb-[5px] text-white text-[12px] sm:text-[14px]"
                            for="register-password">Senha</label>
                        <div class="relative w-full">
                            <input
                                class="password-input h-[55px] w-full p-[20px] pr-[50px] text-[12px] sm:text-[14px] text-gray-500 border-1 rounded-sm border-gray-500 focus:outline-none"
                                type="password" name="register-password" id="register-password"
                                placeholder="Digite sua senha" required>
                            <div class="absolute inset-y-0 end-0 flex items-center pe-10">
                                <i
                                    class="toggle-password fa-solid fa-eye absolute text-[20px] text-white cursor-pointer"></i>
                            </div>
                        </div>
                    </div>

                    <!--terms-and-conditions-->
                    <div class="flex items-center">
                        <input id="terms-and-conditions" class="w-[20px] h-[20px] mr-[5px]" type="checkbox"
                            name="terms-and-conditions" required>
                        <label class="text-[12px] sm:text-[14px] text-gray-500 cursor-pointer"
                            for="terms-and-conditions">Concordar com Termos e Condições.</label>
                    </div>

                    <!--Submit-->
                    <div class="flex flex-col gap-[20px] items-center justify-center">
                        <button type="submit"
                            class="submit-button w-full bg-brand h-[55px] text-white font-bold rounded-sm cursor-not-allowed hover:opacity-[.9] transition duration-300 ease-in-out">Criar
                            conta</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p
            class="absolute bottom-[20px] left-0 right-0 mx-auto text-center text-[10px] sm:text-[12px] text-white lg:left-[50px] lg:right-auto lg:mx-0 lg:text-left">
            © <span id="current-year"></span> | Todos
            os
            direitos
            reservados.
        </p>
    </footer>
</body>

</html>
